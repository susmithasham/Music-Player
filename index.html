<!DOCTYPE html>
<html>
    <head>
        <title> Music Player Application</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div style="background-color: aqua;height:100%" >

        <h1 style="font-size: 30px;color:green;text-align:center">MUSIC PLAYER</h1>
        <img id="songimage" src="IMAGES/image-1(1).jpg"/>
        <h3 id="songname" style="font-size:25px;color:blue;text-align: center;">Meesala pilla Song</h3>
        <h4 id="singername" style="font-size: 20px;color:brown;text-align: center;"> Shweta Mohan</h4>
        <div id="fixed" >
            <div id="movable"></div>
        </div>
        <div id="time">
        <div id="currenttime">0:00</div>
        <div id="duration">2:05</div>
        </div>
        <div id="icons">
            <i class="fa-solid fa-shuffle" id="shuffle"></i>
            <i class="fa-solid fa-backward" id="backward"></i>
            <i class="fa-solid fa-play" id="play"></i>
            <i class="fa-solid fa-forward" id="forward"></i>
            <i class="fa-solid fa-heart" id="heart"></i>
        </div>
        <audio src="AUDIOs/music-1.mp3" id="audio"></audio>
        <script src="app.js"></script>
        </div>
    </body>
</html>
